    - name: Prompt Openshift AI
      vars:
        prompt: >
                Write a minimalist ansible playbook to run on rhel group of hosts
                to mitigate the {{ cve_name }},
                with the following description: '{{ cve_description }}'.
      ansible.builtin.uri:
        url: "{{ ai_endpoint }}"
        method: POST
        body:
          model: "{{ ai_model }}"
          messages: 
            - content: "{{ prompt }}"
          #max_tokens: "{{ ai_max_tokens }}"
        status_code: 200
        body_format: json
        headers:
          Content-Type: "application/json"
          Authorization: "Bearer {{ ai_token }}"
        validate_certs: yes
      delegate_to: localhost
      register: ai_response
      retries: 10
      delay: 5
      until: ai_response.status == 200

    - name: Debug Prompt to Openshift AI
      debug:
        var: ai_response

    - name: Set Generated Ansible Playbook
      ansible.builtin.set_fact:
        generated_playbook: >-
          {{ ai_response.json.choices[0].message.reasoning_content |
          wordwrap(60) |
          comment('plain', prefix='####### REASONING #######', postfix='#######') }}
          
          {{ ai_response.json.choices[0].message.content
             .split('```yaml')[1].split('```')[0] | trim }}

    - name: Debug Clean Playbook
      ansible.builtin.debug:
        var: generated_playbook

    - name: Set stats generated Playbook
      ansible.builtin.set_stats:
        data:
          generated_playbook: "{{ generated_playbook }}"

