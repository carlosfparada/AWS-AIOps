---

- name: Get AI generated Mitigation Code
  hosts: localhost
  connection: local
  gather_facts: no
  vars_files: vars/main.yml
  tasks:
    # - name: Check whether any System is Affected
    #   ansible.builtin.assert:
    #     that:
    #       - affected_systems_id | length > 0
    #     fail_msg: "There ARE NO Systems affected by {{ cve_name }}. Aborting Mitigation."
    #     success_msg: "There ARE Systems affected by {{ cve_name }}: {{ affected_systems }}"

    - name: Fetch CVE data from Red Hat Security Data API
      ansible.builtin.uri:
        url: "https://access.redhat.com/hydra/rest/securitydata/cve/{{ cve_name }}.json"
        method: GET
        return_content: true
        status_code: 200
      register: cve_response

    - name: Display CVE details
      ansible.builtin.debug:
        var: cve_response.json

    - name: Set the CVE Details
      ansible.builtin.set_fact:
        cve_details: "{{ cve_response.json.details | default('No details available for this CVE.') }}"

    - name: Display CVE Mitigation
      ansible.builtin.set_fact:
        cve_mitigation: "{{ cve_response.json.mitigation.value | default('No mitigation available for this CVE.') }}"

    - name: Prompt Openshift AI
      vars:
        prompt: >
                Write an ansible playbook to mitigate CVE {{ cve_name }}.
                Use this list of hosts as targets: '{{ affected_systems_fqdn | join(',') }}.
                The CVE has the following details and mitigation descriprions:
                Details: '{{ cve_details }}'.
                Mitigation: '{{ cve_mitigation }}'.
      ansible.builtin.uri:
        url: "{{ ai_endpoint }}"
        method: POST
        body:
          model: "{{ ai_model }}"
          messages: 
            - content: "{{ prompt }}"
        status_code: 200
        body_format: json
        headers:
          Content-Type: "application/json"
          Authorization: "Bearer {{ ai_token }}"
        validate_certs: yes
      delegate_to: localhost
      register: ai_response
      retries: 10
      delay: 5
      until: ai_response.status == 200

    - name: Debug Prompt to Openshift AI
      debug:
        var: ai_response

    - name: Set Generated Ansible Playbook
      ansible.builtin.set_fact:
        generated_playbook: >-
          {{ ai_response.json.choices[0].message.reasoning_content |
          wordwrap(60) |
          comment('plain', prefix='####### REASONING #######', postfix='#######') }}
          
          {{ ai_response.json.choices[0].message.content
             .split('```yaml')[1].split('```')[0] | trim }}

    - name: Debug generated Playbook
      ansible.builtin.debug:
        var: generated_playbook

    - name: Set stats generated Playbook
      ansible.builtin.set_stats:
        data:
          generated_playbook: "{{ generated_playbook }}"

