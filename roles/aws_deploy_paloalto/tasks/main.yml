---

- name: Create VPC {{ ec2_vpc_name }}
  amazon.aws.ec2_vpc_net:
    name: "{{ ec2_vpc_name }}"
    cidr_block: "{{ ec2_vpc_cidr }}"
    region: "{{ ec2_vpc_region }}"
    state: present
    tags:
      Name: "{{ ec2_vpc_name }}"
  register: vpc

- name: Create Subnet default in VPC
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ vpc.vpc.id }}"
    cidr: "{{ ec2_subnet_cidr }}"
    region: "{{ ec2_vpc_region }}"
    az: "{{ ec2_subnet_az }}"
    state: present
    tags:
      Name: "{{ ec2_subnet_name }}"
  register: subnet

- name: Create Internet Gateway (IGW)
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ vpc.vpc.id }}"
    region: "{{ ec2_vpc_region }}"
    state: present
    tags:
      Name: "{{ ec2_igw_name }}"
  register: igw

- name: Create Route Table and IGW route
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc.vpc.id }}"
    region: "{{ ec2_vpc_region }}"
    state: present
    tags:
      Name: "{{ ec2_rt_name }}"
    subnets:
      - "{{ subnet.subnet.id }}"
    routes:
      - dest: 0.0.0.0/0
        gateway_id: "{{ igw.gateway_id }}"

- name: Create Security Group
  amazon.aws.ec2_security_group:
    name: "{{ ec2_sg_name }}"
    description: Allow inbound on some ports
    state: present
    rules:
      - proto: tcp
        ports: "{{ ec2_sg_openports }}"
        cidr_ip: 0.0.0.0/0
        rule_desc: Allow all on ports
      - proto: icmp
        icmp_code: -1 # icmp type, -1 = any type
        icmp_type:  -1 # icmp subtype, -1 = any subtype
        cidr_ip: 0.0.0.0/0
        rule_desc: Allow all ICMP
    region: "{{ ec2_vpc_region }}"
    vpc_id: "{{ vpc.vpc.id }}"
    tags:
      Name: "{{ ec2_sg_name }}"

# RHEL
- name: Get RHEL AMI by Name
  amazon.aws.ec2_ami_info:
    filters:
      name: "{{ ec2_rhel_image_name }}"
    region: "{{ ec2_vpc_region }}"
  register: ami_rhel_find

- name: Create RHEL instance
  amazon.aws.ec2_instance:
    image_id: "{{ ami_rhel_find.images[-1].image_id | default('') }}"
    instance_type: "{{ ec2_rhel_flavor_name }}"
    security_group: "{{ ec2_sg_name }}"
    name: "{{ ec2_rhel_instance_name }}"
    key_name: "{{ ec2_rhel_key_name }}"
    region: "{{ ec2_vpc_region }}"
    vpc_subnet_id: "{{ subnet.subnet.id }}" # Subnet
    network_interfaces:
      - assign_public_ip: true  # public IP
    tags:
      name: "{{ ec2_rhel_instance_name }}"
    volumes:
      - device_name: "{{ ec2_rhel_ebs_name | default('/dev/sda1', true) }}"
        ebs:
          volume_size: "{{ ec2_rhel_disk_size | default(20, true) }}"
          delete_on_termination: true
    user_data: "{{ lookup('ansible.builtin.template', 'user_data_rhel.j2') }}"
    state: running
  register: ec2_rhel_instance

- name: Print RHEL instance details
  ansible.builtin.debug:
    msg: "Instance RHEL DNS name is: {{ ec2_rhel_instance.instances[0].public_dns_name }} and IP address {{ ec2_rhel_instance.instances[0].public_ip_address }} and IP address (Private) {{ ec2_rhel_instance.instances[0].private_ip_address }}"

# Wait for boot up
- name: Wait until RHEL boots up
  wait_for:
    port: 22
    state: started
    timeout: 360
    delay: 10
    host: "{{ ec2_rhel_instance.instances[0].public_dns_name }}"

- name: Sleep for 30 seconds and continue with play
  wait_for:
    timeout: 30
  delegate_to: localhost

