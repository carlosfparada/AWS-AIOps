# VPC
ec2_vpc_name: VPC_AIOPS
ec2_vpc_region: us-east-1
ec2_vpc_cidr: 10.0.0.0/16
# Subnet
ec2_subnet_name: Subnet_AIOPS
ec2_subnet_cidr: 10.0.0.0/24
ec2_subnet_az: us-east-1a
# IGW
ec2_igw_name: IGW_AIOPS
# Route Table
ec2_rt_name: RT_AIOPS
# RHEL Open ports
ec2_sg_name: SG_AIOPS
ec2_sg_openports:
  - 80
  - 443
  - 22

# RHEL 1
# AMI
ec2_rhel1_image_name: RHEL-9.5.0_HVM*x86_64*
# Flavour 
ec2_rhel1_flavor_name: t2.large
# Disk
ec2_rhel1_disk_size: 20
ec2_rhel1_ebs_name: /dev/sda1
# Key Pair
ec2_rhel1_key_name: "KeyPair-Virginia"
# Instance
ec2_rhel1_instance_name: rhel-1
ec2_rhel1_user: "ec2-user"
ec2_rhel1_pass: "{{ ansible_password }}"

# RHEL 2
# AMI
ec2_rhe2_image_name: RHEL-9.5.0_HVM*x86_64*
# Flavour 
ec2_rhel2_flavor_name: t2.large
# Disk
ec2_rhel2_disk_size: 20
ec2_rhel2_ebs_name: /dev/sda1
# Key Pair
ec2_rhel2_key_name: "KeyPair-Virginia"
# Instance
ec2_rhel2_instance_name: rhel-2
ec2_rhel2_user: "ec2-user"
ec2_rhel2_pass: "{{ ansible_password }}"
