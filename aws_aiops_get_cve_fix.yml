---

- name: Get CVE Fix
  hosts: localhost
  connection: local
  gather_facts: no
  vars_files: vars/main.yml
  tasks:
    - name: Debug Hostvars
      ansible.builtin.debug:
        var: hostvars['localhost']

    - name: AIOps Lightspeed action payload
      ansible.builtin.set_fact:
        payload: "{{ ansible_eda.event.payload }}"

    - name: Debug Payload
      ansible.builtin.debug:
        var: payload

    - name: Debug {{ payload.events[0].payload.reported_cve }} Name
      ansible.builtin.debug:
        msg: "CVE Name: {{ cve_name }}"

    - name: Get access token using Service Account Client ID and Secret
      ansible.builtin.uri:
        url: https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
        method: POST
        body_format: "form-urlencoded"
        body:
          grant_type: client_credentials
          client_id: "{{ lightspeed_client_id }}"
          client_secret: "{{ lightspeed_client_secret }}"
        status_code: 200
      register: sso_response

    - name: Query Lightspeed for the affected systems
      ansible.builtin.uri:
        url: "https://console.redhat.com/api/vulnerability/v1/cves/{{ cve_name }}/affected_systems"
        method: GET
        headers:
          Authorization: "Bearer {{ sso_response.json.access_token }}"
        status_code: 200
      register: systems_response

    - name: Extract UUIDs into a flat list
      ansible.builtin.set_fact:
        dynamic_system_uuids: "{{ systems_response.json.data | map(attribute='id') | list }}"

    - name: Check if any system is affected
      ansible.builtin.fail:
        msg: "No systems are reported as affected by {{ cve_name }}. Aborting..."
      when: dynamic_system_uuids | length == 0

    - name: Download the Remediation Playbook (.yml)
      ansible.builtin.uri:
        url: https://console.redhat.com/api/remediations/v1/remediations
        method: POST
        headers:
          Authorization: "Bearer {{ sso_response.json.access_token }}"
        status_code: 200
        body_format: json
        body:
          name: "Fix {{ cve_name }}"
          auto_reboot: false
          add:
            issues:
              - id: "vulnerabilities:{{ cve_name }}"
                systems: "{{ affected_systems }}"
      register: download_remediation


    - name: Download the Remediation Playbook (.yml)
      ansible.builtin.uri:
        url: "https://console.redhat.com/api/remediations/v1/remediations/download?vulnerabilities={{ cve_name }}&systems={{ affected_systems | join(',') }}"
        method: GET
        headers:
          Authorization: "Bearer {{ sso_response.json.access_token }}"
        status_code: 200
      register: download_remediation


    - name: Debug Clean Playbook
      ansible.builtin.debug:
        var: generated_playbook

    - name: Set stats generated Playbook
      ansible.builtin.set_stats:
        data:
          generated_playbook: "{{ generated_playbook }}"