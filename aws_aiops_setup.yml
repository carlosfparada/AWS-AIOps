---

- name: Get nodes from Inventory and add to Groups
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
  - include_role: 
      name: utils_hosts_aws


- name: Setup RHELs with Lightspeed
  hosts: rhel
  become: true
  tasks:
    - debug:
        # var: hostvars[inventory_hostname].tags.Name
        var: inventory_hostname

    - name: Register using Org ID and Activation Key
      community.general.redhat_subscription:
        state: present
        org_id: "{{ org_id }}"
        activationkey: "{{ activation_key }}"
        force_register: true
      become: true

    - name: Register with Insights
      redhatinsights.insights.insights_register:
        state: present
        #display_name: "{{ hostvars[inventory_hostname].tags.Name }}"
        display_name: "{{ inventory_hostname }}"
        force_reregister: true
      become: true
