---

- name: Store Code in Git (Fix)
  hosts: localhost
  connection: local
  gather_facts: no
  vars_files: vars/main.yml
  tasks:
    - name: Retrieve a repository (Fix)
      ansible.scm.git_retrieve:
        origin:
          url: "{{ github_url }}"
        upstream:
          url: "{{ github_url }}"
        branch: 
          name: "{{ github_branch }}"
          duplicate_detection: false
      register: repository

    - name: Debug repository data
      debug: 
        var: repository

    - name: Copy playbook content to the GIT folder (Fix)
      ansible.builtin.copy:
        content: "{{ generated_playbook }}"
        dest: "{{ repository['path'] }}/playbook_fix.yml"
        force: true
        mode: '0644'

    - name: Publish the changes (Fix)
      ansible.scm.git_publish:
        commit:
          message: Adding new playbook_fix_{{ cve_name }}.yml"
        path: "{{ repository['path'] }}"
        user:
          name: "{{ github_user }}"
          email: "{{ github_email }}"
        token: "{{ github_token }}"

