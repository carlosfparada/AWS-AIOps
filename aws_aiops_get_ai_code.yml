---

- name: Get nodes from Inventory and add to Groups
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
  - include_role: 
      name: utils_hosts_aws


- name: RHELs with Lightspeed Action
  hosts: localhost
  connection: local
  gather_facts: no
  vars_files: vars/main.yml
  tasks:
    - name: Debug Hostvars
      debug:
        var: hostvars['localhost']

    - name: AIOps Lightspeed action payload
      set_fact:
        payload: "{{ ansible_eda.event.payload }}"

    - name: Debug Payload
      debug:
        var: payload


  ######
  # AI Prompt
  ######

    - name: Prompt Openshift AI
      vars:
        prompt: >
                Write an ansible playbook to mitigate the following CVE:
                '{{ cve_description }}'
                Return for me only the playbook code, remove all other text.
      ansible.builtin.uri:
        url: "{{ ai_endpoint }}"
        method: POST
        body:
          model: "{{ ai_model }}"
          prompt: "{{ prompt }}"
          max_tokens: "{{ ai_max_tokens }}"
          temperature: 0
        status_code: 200
        body_format: json
        headers:
          Content-Type: "application/json"
          Authorization: "Bearer {{ ai_token }}"
        validate_certs: yes
      delegate_to: localhost
      register: ai_response

    - name: Debug Prompt to Openshift AI
      debug:
        var: ai_response

    - name: Set Generated Ansible Playbook
      ansible.builtin.set_fact:
        generated_playbook: >-
          {{ ai_response.json.choices[0].text
             .split('```yaml')[1]
             .split('```')[0]
             | trim }}

    - name: Debug Clean Playbook
      debug:
        var: generated_playbook

